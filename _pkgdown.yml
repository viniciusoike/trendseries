url: https://viniciusoike.github.io/trendseries/

template:
  bootstrap: 5
  bslib:
    bootswatch: yeti
    pkgdown-nav-height: 100px
    base_font: {google: "Roboto"}
    heading_font: {google: "Lora"}
    code_font: {google: "JetBrains Mono"}
    "code-font-size": 0.82em
    primary: "#1E3A5F"
    bg: "#fefefe"
    fg: "#000000"


logo:
  src: man/figures/logo.png
  alt: "trendseries hexsticker"

home:
  # Prevent dev-only .md files from being rendered as site pages
  links:
  - text: Browse source code
    href: https://github.com/viniciusoike/trendseries

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/viniciusoike/trendseries
      aria-label: GitHub

articles:
  # trendseries.Rmd is listed here but pkgdown excludes it from the articles
  # dropdown because it is already used as the intro (Get Started) navbar entry.
  # It appears only via the top-level Get Started link, not inside Articles.
  - title: Vignettes
    navbar: ~
    contents:
      - trendseries
      - moving-averages
      - econometric-filters

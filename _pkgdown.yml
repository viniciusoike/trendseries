url: https://viniciusoike.github.io/trendseries/

template:
  bootstrap: 5
  bslib:
    bootswatch: yeti
    pkgdown-nav-height: 100px
    base_font: {google: "Roboto"}
    heading_font: {google: "Lora"}
    code_font: {google: "JetBrains Mono"}
    "code-font-size": 0.82em
    primary: "#1E3A5F"
    bg: "#fefefe"
    fg: "#000000"


logo:
  src: man/figures/logo.png
  alt: "trendseries hexsticker"

home:
  # Prevent dev-only .md files from being rendered as site pages
  links:
  - text: Browse source code
    href: https://github.com/viniciusoike/trendseries

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/viniciusoike/trendseries
      aria-label: GitHub

articles:
  - title: Get started
    navbar: ~
    contents:
      - trendseries
  - title: Filters
    navbar: Filters
    contents:
      - moving-averages
      - econometric-filters
